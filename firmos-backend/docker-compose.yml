# firmOS backend local development
# Start: docker compose up -d

services:
  postgres:
    image: supabase/postgres:15.8.1.145
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: firmos
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../supabase/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: python -m automation.worker
    env_file: .env
    depends_on: [postgres]

  scheduler:
    build: .
    command: python -m automation.scheduler
    env_file: .env
    depends_on: [postgres]

volumes:
  pgdata:
